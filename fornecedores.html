<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornext — Fornecedores</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue-dark:#1e40af;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --ink:#111110;--ink2:#6b7280;--ink3:#9ca3af;
  --bg:#ffffff;--bg2:#f9fafb;--bg3:#f3f4f6;
  --border:#e5e7eb;--border2:#d1d5db;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;
  --r:8px;--font:'Inter',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg2);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}

/* NAV */
nav{background:var(--bg);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:50}
.nav-inner{display:flex;align-items:center;gap:16px;width:100%}
.nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0}
.nav-logo-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
.nav-logo-text{font-size:14px;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
.nav-logo-text em{font-style:normal;color:var(--blue)}
.nav-search{flex:1;max-width:400px;position:relative}
.nav-search input{width:100%;padding:7px 12px 7px 34px;border:1.5px solid var(--border2);border-radius:7px;font-size:13px;font-family:var(--font);background:var(--bg2);color:var(--ink);outline:none;transition:border-color .15s}
.nav-search input:focus{border-color:var(--blue);background:var(--bg)}
.nav-search input::placeholder{color:var(--ink3)}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px}
.nav-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;text-decoration:none}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dark)}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--border2)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;gap:0;min-height:calc(100vh - 56px)}

/* SIDEBAR */
.sidebar{background:var(--bg);border-right:1px solid var(--border);padding:20px 16px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sidebar-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:10px;padding:0 4px}
.filter-group{margin-bottom:20px}
.cat-filter{display:flex;flex-direction:column;gap:3px}
.cat-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s;border:none;background:transparent;text-align:left;width:100%;font-family:var(--font)}
.cat-btn:hover{background:var(--bg2);color:var(--ink)}
.cat-btn.active{background:var(--blue-bg);color:var(--blue);font-weight:600}
.cat-btn .cat-count{margin-left:auto;font-size:10px;background:var(--bg3);color:var(--ink3);padding:1px 6px;border-radius:100px}
.cat-btn.active .cat-count{background:var(--blue-border);color:var(--blue)}
.sidebar-divider{height:1px;background:var(--border);margin:16px 0}
.order-group{display:flex;flex-direction:column;gap:3px}
.order-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s;border:none;background:transparent;text-align:left;width:100%;font-family:var(--font)}
.order-btn:hover{background:var(--bg2);color:var(--ink)}
.order-btn.active{background:var(--blue-bg);color:var(--blue);font-weight:600}

/* MAIN */
.main{padding:24px}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:gap}
.main-title{font-size:15px;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}
.main-count{font-size:12px;color:var(--ink3);margin-top:2px}
.active-filter{display:inline-flex;align-items:center;gap:6px;background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:100px;padding:4px 10px;font-size:11px;color:var(--blue);font-weight:600;margin-top:8px}
.active-filter button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;line-height:1;padding:0}

/* GRID */
.suppliers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* CARD */
.supplier-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .15s,box-shadow .15s;cursor:pointer;text-decoration:none;display:block;position:relative}
.supplier-card:hover{border-color:var(--blue-border);box-shadow:0 4px 16px rgba(37,99,235,.08)}
.supplier-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.supplier-avatar{width:40px;height:40px;border-radius:10px;background:var(--blue-bg);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.supplier-rank{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.rank-badge{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.rank-1{background:#fef9c3;color:#92400e}
.rank-2{background:#f3f4f6;color:#6b7280}
.rank-3{background:#fff7ed;color:#c2410c}
.rank-other{background:var(--bg3);color:var(--ink3)}
.supplier-score{font-size:11px;font-weight:700;color:var(--green)}
.supplier-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;letter-spacing:-0.01em}
.supplier-cat{font-size:11px;color:var(--blue);font-weight:600;background:var(--blue-bg);padding:2px 8px;border-radius:100px;display:inline-block;margin-bottom:8px}
.supplier-location{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:4px;margin-bottom:10px}
.supplier-desc{font-size:12px;color:var(--ink2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
.supplier-footer{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.supplier-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink3)}
.supplier-meta strong{color:var(--ink2);font-weight:600}
.rfq-btn{margin-left:auto;background:var(--blue);color:#fff;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.rfq-btn:hover{opacity:.88}

/* EMPTY / LOADING */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 24px;text-align:center;grid-column:1/-1}
.state-icon{font-size:32px;margin-bottom:12px}
.state-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:6px}
.state-sub{font-size:12px;color:var(--ink2);line-height:1.6;max-width:280px}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .nav-search{max-width:100%}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".9"/>
          <rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".55"/>
          <rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".55"/>
          <rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".9"/>
        </svg>
      </div>
      <span class="nav-logo-text">For<em>next</em></span>
    </a>
    <div class="nav-search">
      <span class="nav-search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar fornecedor por nome ou cidade..." oninput="filtrar()">
    </div>
    <div class="nav-actions">
      <a href="cadastro-fornecedor.html" class="btn btn-ghost">+ Cadastrar empresa</a>
      <a href="rfq.html" class="btn btn-blue">Solicitar orçamento</a>
    </div>
  </div>
</nav>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-group">
      <div class="sidebar-title">Categoria</div>
      <div class="cat-filter" id="cat-filter">
        <button class="cat-btn active" data-cat="" onclick="setCategoria('')">
          🏠 Todas as categorias
          <span class="cat-count" id="count-all">—</span>
        </button>
        <button class="cat-btn" data-cat="Uniformes Corporativos" onclick="setCategoria('Uniformes Corporativos')">👕 Uniformes<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="EPI" onclick="setCategoria('EPI')">🦺 EPI<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Tintas Industriais" onclick="setCategoria('Tintas Industriais')">🎨 Tintas<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="MRO" onclick="setCategoria('MRO')">🔧 MRO<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Embalagens" onclick="setCategoria('Embalagens')">📦 Embalagens<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Limpeza e Higiene" onclick="setCategoria('Limpeza e Higiene')">🧹 Limpeza<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Material de Escritório" onclick="setCategoria('Material de Escritório')">📎 Escritório<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="TI e Periféricos" onclick="setCategoria('TI e Periféricos')">💻 TI<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Alimentação Corporativa" onclick="setCategoria('Alimentação Corporativa')">🍽 Alimentação<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Facilities" onclick="setCategoria('Facilities')">🏢 Facilities<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Logística" onclick="setCategoria('Logística')">🚚 Logística<span class="cat-count">—</span></button>
        <button class="cat-btn" data-cat="Materiais Elétricos" onclick="setCategoria('Materiais Elétricos')">⚡ Elétrica<span class="cat-count">—</span></button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="filter-group">
      <div class="sidebar-title">Ordenar por</div>
      <div class="order-group">
        <button class="order-btn active" data-order="avaliacao" onclick="setOrdem('avaliacao')">⭐ Melhor avaliação</button>
        <button class="order-btn" data-order="recente" onclick="setOrdem('recente')">🕐 Mais recentes</button>
        <button class="order-btn" data-order="nome" onclick="setOrdem('nome')">🔤 Nome A–Z</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title">Fornecedores</div>
        <div class="main-count" id="result-count">Carregando...</div>
      </div>
    </div>
    <div class="suppliers-grid" id="suppliers-grid">
      <!-- Skeletons -->
      ${Array(6).fill(`
        <div class="supplier-card">
          <div class="supplier-card-top">
            <div class="skeleton" style="width:40px;height:40px;border-radius:10px"></div>
            <div class="skeleton" style="width:24px;height:24px;border-radius:7px"></div>
          </div>
          <div class="skeleton" style="width:70%;height:14px;margin-bottom:8px"></div>
          <div class="skeleton" style="width:40%;height:11px;margin-bottom:8px;border-radius:100px"></div>
          <div class="skeleton" style="width:100%;height:11px;margin-bottom:4px"></div>
          <div class="skeleton" style="width:80%;height:11px"></div>
        </div>
      `).join('')}
    </div>
  </main>

</div>

<script>
const SUPABASE_URL = 'https://xnpvysulxouzxqdqhwuq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucHZ5c3VseG91enhxZHFod3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTU0MjgsImV4cCI6MjA5NTk3MTQyOH0.dmQRu68NfNq2nSN3YAszVR9u7yf4YgyevindTBWIYV8';

let todos = [];
let categoriaAtiva = '';
let ordemAtiva = 'avaliacao';

const catEmojis = {
  'Uniformes Corporativos':'👕','EPI':'🦺','Tintas Industriais':'🎨',
  'MRO':'🔧','Embalagens':'📦','Limpeza e Higiene':'🧹',
  'Material de Escritório':'📎','TI e Periféricos':'💻',
  'Alimentação Corporativa':'🍽','Facilities':'🏢',
  'Logística':'🚚','Materiais Elétricos':'⚡'
};

async function carregar() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fornecedores?select=*&ativo=eq.true`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    todos = await res.json();
    atualizarContagens();
    renderizar();
  } catch(e) {
    document.getElementById('suppliers-grid').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Erro ao carregar</div>
        <div class="state-sub">Verifique sua conexão e recarregue a página.</div>
      </div>`;
  }
}

function atualizarContagens() {
  const btns = document.querySelectorAll('.cat-btn');
  btns.forEach(btn => {
    const cat = btn.dataset.cat;
    const count = cat === '' ? todos.length : todos.filter(f => f.categoria === cat).length;
    const span = btn.querySelector('.cat-count');
    if(span) span.textContent = count;
  });
}

function setCategoria(cat) {
  categoriaAtiva = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderizar();
}

function setOrdem(ordem) {
  ordemAtiva = ordem;
  document.querySelectorAll('.order-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.order === ordem);
  });
  renderizar();
}

function filtrar() { renderizar(); }

function renderizar() {
  const busca = document.getElementById('search-input').value.toLowerCase().trim();
  let lista = [...todos];

  if(categoriaAtiva) lista = lista.filter(f => f.categoria === categoriaAtiva);
  if(busca) lista = lista.filter(f =>
    f.nome?.toLowerCase().includes(busca) ||
    f.cidade?.toLowerCase().includes(busca) ||
    f.descricao?.toLowerCase().includes(busca)
  );

  if(ordemAtiva === 'avaliacao') lista.sort((a,b) => (b.avaliacao_media||0) - (a.avaliacao_media||0));
  else if(ordemAtiva === 'recente') lista.sort((a,b) => new Date(b.criado_em) - new Date(a.criado_em));
  else if(ordemAtiva === 'nome') lista.sort((a,b) => a.nome?.localeCompare(b.nome));

  const total = lista.length;
  document.getElementById('result-count').textContent =
    total === 0 ? 'Nenhum fornecedor encontrado' :
    total === 1 ? '1 fornecedor encontrado' :
    `${total} fornecedores encontrados`;

  const grid = document.getElementById('suppliers-grid');

  if(total === 0) {
    grid.innerHTML = `
      <div class="state-box">
        <div class="state-icon">🔍</div>
        <div class="state-title">Nenhum resultado</div>
        <div class="state-sub">Tente buscar por outro termo ou categoria.</div>
      </div>`;
    return;
  }

  grid.innerHTML = lista.map((f, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
    const rankLabel = rank <= 9 ? `#${rank}` : rank;
    const emoji = catEmojis[f.categoria] || '🏭';
    const nota = f.avaliacao_media > 0 ? `★ ${f.avaliacao_media.toFixed(1)}` : '★ Novo';
    const notaClass = f.avaliacao_media > 0 ? 'supplier-score' : 'supplier-score' ;
    return `
      <div class="supplier-card" onclick="verFornecedor('${f.id}')">
        <div class="supplier-card-top">
          <div class="supplier-avatar">${emoji}</div>
          <div class="supplier-rank">
            <div class="rank-badge ${rankClass}">${rankLabel}</div>
            <div class="${notaClass}">${nota}</div>
          </div>
        </div>
        <div class="supplier-name">${f.nome}</div>
        <div class="supplier-cat">${f.categoria}</div>
        <div class="supplier-location">📍 ${f.cidade}${f.estado ? ', ' + f.estado : ''}</div>
        <div class="supplier-desc">${f.descricao || 'Sem descrição.'}</div>
        <div class="supplier-footer">
          <div class="supplier-meta">⏱ <strong>${f.prazo_entrega || '—'}</strong></div>
          <div class="supplier-meta">📦 <strong>${f.capacidade || '—'}</strong></div>
          <button class="rfq-btn" onclick="solicitarRFQ(event,'${f.id}','${f.nome.replace(/'/g,"\\'")}')">Pedir orçamento</button>
        </div>
      </div>`;
  }).join('');
}

function verFornecedor(id) {
  window.location.href = `fornecedor.html?id=${id}`;
}

function solicitarRFQ(e, id, nome) {
  e.stopPropagation();
  window.location.href = `rfq.html?fornecedor=${id}&nome=${encodeURIComponent(nome)}`;
}

carregar();
</script>
</body>
</html>
