<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornext — Perfil do Fornecedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue-dark:#1e40af;--blue-bg:#eff6ff;--blue-border:#bfdbfe;
  --ink:#111110;--ink2:#6b7280;--ink3:#9ca3af;
  --bg:#ffffff;--bg2:#f9fafb;--bg3:#f3f4f6;
  --border:#e5e7eb;--border2:#d1d5db;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;
  --r:8px;--font:'Inter',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg2);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}

/* NAV */
nav{background:var(--bg);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:50}
.nav-inner{display:flex;align-items:center;gap:12px;width:100%}
.nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none}
.nav-logo-icon{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
.nav-logo-text{font-size:14px;font-weight:700;letter-spacing:-0.03em;color:var(--ink)}
.nav-logo-text em{font-style:normal;color:var(--blue)}
.nav-sep{width:1px;height:18px;background:var(--border)}
.nav-breadcrumb{font-size:12px;color:var(--ink2)}
.nav-breadcrumb a{color:var(--ink2);text-decoration:none}
.nav-breadcrumb a:hover{color:var(--blue)}
.nav-actions{margin-left:auto;display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;text-decoration:none}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dark)}
.btn-ghost{background:transparent;color:var(--ink2);border:1.5px solid var(--border2)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-lg{padding:11px 24px;font-size:13px;border-radius:9px}

/* LAYOUT */
.page{max-width:900px;margin:0 auto;padding:32px 24px 80px}

/* HERO CARD */
.hero-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:16px}
.hero-top{display:flex;align-items:flex-start;gap:18px;margin-bottom:20px}
.hero-avatar{width:64px;height:64px;border-radius:14px;background:var(--blue-bg);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.hero-info{flex:1}
.hero-name{font-size:20px;font-weight:700;letter-spacing:-0.03em;color:var(--ink);margin-bottom:6px}
.hero-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.tag-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tag-gray{background:var(--bg3);color:var(--ink2);border:1px solid var(--border)}
.hero-location{font-size:12px;color:var(--ink3)}
.hero-score-box{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;flex-shrink:0;text-align:center}
.hero-score-num{font-size:26px;font-weight:700;color:var(--green);letter-spacing:-0.03em;line-height:1}
.hero-score-stars{font-size:12px;color:var(--amber)}
.hero-score-label{font-size:10px;color:var(--ink3)}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding-top:20px;border-top:1px solid var(--border)}
.hero-stat{display:flex;flex-direction:column;gap:3px}
.hero-stat .num{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-0.02em}
.hero-stat .lbl{font-size:11px;color:var(--ink2)}

/* CONTENT GRID */
.content-grid{display:grid;grid-template-columns:1fr 280px;gap:16px}
.col-main{display:flex;flex-direction:column;gap:16px}
.col-side{display:flex;flex-direction:column;gap:16px}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:22px}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:14px}
.card p{font-size:13px;color:var(--ink2);line-height:1.7}

/* DETAILS */
.detail-list{display:flex;flex-direction:column;gap:10px}
.detail-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg2);border-radius:7px}
.detail-item .detail-label{font-size:12px;color:var(--ink2)}
.detail-item .detail-value{font-size:12px;font-weight:600;color:var(--ink)}

/* AVALIAÇÕES */
.reviews-list{display:flex;flex-direction:column;gap:12px}
.review-item{padding:14px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.review-company{font-size:12px;font-weight:600;color:var(--ink)}
.review-score{font-size:12px;font-weight:700;color:var(--green)}
.review-date{font-size:10px;color:var(--ink3)}
.review-text{font-size:12px;color:var(--ink2);line-height:1.55}
.no-reviews{text-align:center;padding:24px;color:var(--ink3);font-size:12px}

/* SCORE BAR */
.score-bars{display:flex;flex-direction:column;gap:8px}
.score-bar-row{display:flex;align-items:center;gap:8px}
.score-bar-label{font-size:11px;color:var(--ink2);width:20px;text-align:right;flex-shrink:0}
.score-bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .6s ease}
.score-bar-count{font-size:10px;color:var(--ink3);width:20px;flex-shrink:0}

/* CTA SIDE */
.cta-card{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:12px;padding:22px;text-align:center}
.cta-card h3{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px}
.cta-card p{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:16px}
.cta-card .btn{width:100%;justify-content:center}

/* CONTACT CARD */
.contact-list{display:flex;flex-direction:column;gap:8px}
.contact-item{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink2)}
.contact-item a{color:var(--blue);text-decoration:none}
.contact-item a:hover{text-decoration:underline}

/* LOADING / ERROR */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center}
.state-icon{font-size:32px;margin-bottom:12px}
.state-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px}
.state-sub{font-size:13px;color:var(--ink2);line-height:1.6}

@media(max-width:720px){
  .content-grid{grid-template-columns:1fr}
  .col-side{order:-1}
  .hero-top{flex-wrap:wrap}
  .hero-score-box{width:100%}
  .hero-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".9"/>
          <rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".55"/>
          <rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".55"/>
          <rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".9"/>
        </svg>
      </div>
      <span class="nav-logo-text">For<em>next</em></span>
    </a>
    <div class="nav-sep"></div>
    <div class="nav-breadcrumb">
      <a href="fornecedores.html">Fornecedores</a> → <span id="breadcrumb-name">Carregando...</span>
    </div>
    <div class="nav-actions">
      <a href="fornecedores.html" class="btn btn-ghost">← Voltar</a>
    </div>
  </div>
</nav>

<div class="page" id="page-content">
  <div class="state-box">
    <div class="state-icon">⏳</div>
    <div class="state-title">Carregando perfil...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xnpvysulxouzxqdqhwuq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucHZ5c3VseG91enhxZHFod3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTU0MjgsImV4cCI6MjA5NTk3MTQyOH0.dmQRu68NfNq2nSN3YAszVR9u7yf4YgyevindTBWIYV8';

const catEmojis = {
  'Uniformes Corporativos':'👕','EPI':'🦺','Tintas Industriais':'🎨',
  'MRO':'🔧','Embalagens':'📦','Limpeza e Higiene':'🧹',
  'Material de Escritório':'📎','TI e Periféricos':'💻',
  'Alimentação Corporativa':'🍽','Facilities':'🏢',
  'Logística':'🚚','Materiais Elétricos':'⚡'
};

function getStars(nota) {
  const n = Math.round(nota / 2);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function formatDate(dt) {
  return new Date(dt).toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' });
}

async function carregar() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    renderErro('ID não informado', 'Acesse esta página a partir da listagem de fornecedores.');
    return;
  }

  try {
    // Busca fornecedor
    const res = await fetch(`${SUPABASE_URL}/rest/v1/fornecedores?id=eq.${id}&select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();

    if (!data.length) {
      renderErro('Fornecedor não encontrado', 'Este perfil pode ter sido removido ou o link está incorreto.');
      return;
    }

    const f = data[0];

    // Busca avaliações
    const resAv = await fetch(`${SUPABASE_URL}/rest/v1/avaliacoes?fornecedor_id=eq.${id}&select=*&order=criado_em.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const avaliacoes = await resAv.json();

    renderPerfil(f, avaliacoes);

  } catch(e) {
    renderErro('Erro de conexão', 'Verifique sua internet e tente novamente.');
  }
}

function renderErro(titulo, sub) {
  document.getElementById('page-content').innerHTML = `
    <div class="state-box">
      <div class="state-icon">⚠️</div>
      <div class="state-title">${titulo}</div>
      <div class="state-sub">${sub}</div>
      <a href="fornecedores.html" class="btn btn-blue" style="margin-top:20px">Ver fornecedores</a>
    </div>`;
}

function renderPerfil(f, avaliacoes) {
  document.title = `Fornext — ${f.nome}`;
  document.getElementById('breadcrumb-name').textContent = f.nome;

  const emoji = catEmojis[f.categoria] || '🏭';
  const nota = f.avaliacao_media > 0 ? f.avaliacao_media.toFixed(1) : '—';
  const stars = f.avaliacao_media > 0 ? getStars(f.avaliacao_media) : '☆☆☆☆☆';
  const totalAv = avaliacoes.length;

  // Distribuição de notas
  const dist = {10:0,9:0,8:0,7:0,6:0};
  avaliacoes.forEach(a => {
    const k = Math.min(10, Math.max(6, Math.round(a.nota / 1) ));
    if(dist[k] !== undefined) dist[k]++;
  });

  const distHTML = [10,9,8,7,6].map(n => {
    const pct = totalAv > 0 ? (dist[n] / totalAv * 100) : 0;
    return `
      <div class="score-bar-row">
        <div class="score-bar-label">${n}</div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%"></div></div>
        <div class="score-bar-count">${dist[n]}</div>
      </div>`;
  }).join('');

  const reviewsHTML = avaliacoes.length === 0
    ? `<div class="no-reviews">Ainda sem avaliações. Seja o primeiro a avaliar!</div>`
    : avaliacoes.map(a => `
        <div class="review-item">
          <div class="review-header">
            <span class="review-company">Comprador verificado</span>
            <span class="review-score">★ ${a.nota}/10</span>
          </div>
          <div class="review-date">${formatDate(a.criado_em)}</div>
          ${a.comentario ? `<div class="review-text" style="margin-top:6px">${a.comentario}</div>` : ''}
        </div>`).join('');

  document.getElementById('page-content').innerHTML = `

    <!-- HERO -->
    <div class="hero-card">
      <div class="hero-top">
        <div class="hero-avatar">${emoji}</div>
        <div class="hero-info">
          <div class="hero-name">${f.nome}</div>
          <div class="hero-tags">
            <span class="tag tag-blue">${f.categoria}</span>
            <span class="tag tag-gray">📍 ${f.cidade}${f.estado ? ', ' + f.estado : ''}</span>
            ${f.prazo_entrega ? `<span class="tag tag-gray">⏱ ${f.prazo_entrega}</span>` : ''}
          </div>
          <div class="hero-location">Cadastrado em ${formatDate(f.criado_em)}</div>
        </div>
        <div class="hero-score-box">
          <div class="hero-score-num">${nota}</div>
          <div class="hero-score-stars">${stars}</div>
          <div class="hero-score-label">${totalAv} avaliação${totalAv !== 1 ? 'ões' : ''}</div>
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="num">${f.total_rfqs || 0}</div>
          <div class="lbl">RFQs recebidas</div>
        </div>
        <div class="hero-stat">
          <div class="num">${totalAv}</div>
          <div class="lbl">Avaliações</div>
        </div>
        <div class="hero-stat">
          <div class="num">${f.capacidade || '—'}</div>
          <div class="lbl">Capacidade</div>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content-grid">
      <div class="col-main">

        <!-- SOBRE -->
        <div class="card">
          <div class="card-title">Sobre a empresa</div>
          <p>${f.descricao || 'Sem descrição.'}</p>
        </div>

        <!-- DETALHES -->
        <div class="card">
          <div class="card-title">Informações operacionais</div>
          <div class="detail-list">
            <div class="detail-item">
              <span class="detail-label">📦 Categoria</span>
              <span class="detail-value">${f.categoria}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">⚡ Capacidade</span>
              <span class="detail-value">${f.capacidade || '—'}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">⏱ Prazo de entrega</span>
              <span class="detail-value">${f.prazo_entrega || '—'}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">📍 Localização</span>
              <span class="detail-value">${f.cidade}${f.estado ? ', ' + f.estado : ''}</span>
            </div>
          </div>
        </div>

        <!-- AVALIAÇÕES -->
        <div class="card">
          <div class="card-title">Avaliações (${totalAv})</div>
          ${totalAv > 0 ? `
            <div class="score-bars" style="margin-bottom:16px">${distHTML}</div>
          ` : ''}
          <div class="reviews-list">${reviewsHTML}</div>
        </div>

      </div>
      <div class="col-side">

        <!-- CTA -->
        <div class="cta-card">
          <h3>Precisa de ${f.categoria}?</h3>
          <p>Envie um pedido de orçamento para ${f.nome} agora mesmo.</p>
          <a href="rfq.html?fornecedor=${f.id}&nome=${encodeURIComponent(f.nome)}" class="btn btn-blue btn-lg">Solicitar orçamento</a>
        </div>

        <!-- CONTATO -->
        <div class="card">
          <div class="card-title">Contato</div>
          <div class="contact-list">
            <div class="contact-item">📧 <a href="mailto:${f.email}">${f.email}</a></div>
            ${f.telefone ? `<div class="contact-item">📱 <a href="https://wa.me/55${f.telefone.replace(/\D/g,'')}" target="_blank">${f.telefone}</a></div>` : ''}
            ${f.site ? `<div class="contact-item">🌐 <a href="${f.site}" target="_blank">${f.site.replace(/https?:\/\//,'')}</a></div>` : ''}
          </div>
        </div>

        <!-- COMPARTILHAR -->
        <div class="card">
          <div class="card-title">Compartilhar perfil</div>
          <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="copiarLink()">🔗 Copiar link</button>
        </div>

      </div>
    </div>`;
}

function copiarLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    alert('Link copiado!');
  });
}

carregar();
</script>
</body>
</html>
